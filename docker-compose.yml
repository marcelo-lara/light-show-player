version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
      - "6454:6454/udp"
    environment:
      - PORT=3001
      - DMX_NODE_IP=192.168.10.221
      - ARTNET_UNIVERSE=0
    volumes:
      - ./data:/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:5173"
    environment:
      - VITE_BACKEND_URL=ws://localhost:3001
    restart: always

networks:
  default:
    name: light-show-network